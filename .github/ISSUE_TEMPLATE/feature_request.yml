name: Feature request
description: Suggest an improvement for PulsorClip
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the improvement you want.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Any references, examples, or UX notes.
